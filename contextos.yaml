# ContextOS runtime config (plugin-first; same plan runs local or cloud — SPEC §8).
runtime:
  plugins:
    model: stub          # "stub" (offline) | "litellm"
    store: inmemory      # "inmemory" (offline) | "redevops_rag"
  default_tier: local

budgets:
  max_tokens: 120000
  max_cost_usd: 5.00
  max_latency_seconds: 120

retrieval:
  top_k: 50
  final_k: 8
  target_tokens: 3000

costmodel:
  stats_path: .contextos/costmodel_stats.json   # the trust layer persists here
  weights: { acc: 1.0, cost: 0.6, lat: 0.3, risk: 0.8, hall: 0.9, loss: 0.4, cache: 0.2, vrf: 0.5 }

observability:
  trace_dir: .contextos/traces
