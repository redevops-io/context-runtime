# Minimal LibreChat config exposing the Context Runtime self-learning endpoints —
# one per runtime (Python + Go), so the SAME LibreChat can drive either. Each chat turn
# retrieves context (learned strategy), injects it, answers, then judges retrieval
# quality and learns. Point each at that runtime's control-plane OpenAI shim (/v1).
version: 1.2.1
cache: true

endpoints:
  custom:
    - name: "Context Runtime (Python)"
      apiKey: "${CONTEXT_RUNTIME_API_KEY}"
      baseURL: "${CONTEXT_RUNTIME_URL}/v1"
      models:
        default:
          - "context-runtime"
        fetch: true
      titleConvo: true
      titleModel: "context-runtime"
      summarize: false
      modelDisplayLabel: "Context Runtime · Python (self-learning RAG)"

    - name: "Context Runtime (Go)"
      apiKey: "${CONTEXT_RUNTIME_API_KEY}"
      baseURL: "${CONTEXT_RUNTIME_GO_URL}/v1"
      models:
        default:
          - "context-runtime"
        fetch: true
      titleConvo: true
      titleModel: "context-runtime"
      summarize: false
      modelDisplayLabel: "Context Runtime · Go (self-learning RAG)"
